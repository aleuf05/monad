<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Character Voice Studio · Monad</title><link rel="stylesheet" href="style.css"></head><body>
<main><a href="../../index.html" class="home">← Fleet Monad</a><header><p class="eyebrow">NEW · General Character System</p><h1>Character Voice Studio</h1><p>Choose any registered character, shape the performance, and hear the same line without changing the character underneath.</p></header>
<section class="panel"><div class="row"><label>Character<select id="character"></select></label><div><small>ROLE</small><strong id="role"></strong><p id="description"></p></div></div>
<label>Words<textarea id="text" rows="4">Status steady. We have room to proceed, but I recommend we keep the formation close.</textarea></label>
<div class="controls"><label>Intent<select id="intent"><option>operational</option><option>urgent</option><option>reassuring</option><option>reflective</option><option>ceremonial</option><option>humorous</option></select></label><label>Tension <output id="tensionOut">35</output><input id="tension" type="range" min="0" max="100" value="35"></label><label>Warmth <output id="warmthOut">50</output><input id="warmth" type="range" min="0" max="100" value="50"></label><label>Energy <output id="energyOut">50</output><input id="energy" type="range" min="0" max="100" value="50"></label><label>Restraint <output id="restraintOut">70</output><input id="restraint" type="range" min="0" max="100" value="70"></label></div>
<div class="actions"><button id="speak">Perform Line</button><button id="reset" class="secondary">Reset Continuity</button></div><p id="status">Ready · Browser Speech</p><pre id="inspection">No performance yet.</pre></section></main>
<script src="../shared/voice.js"></script><script src="../shared/characters.js"></script><script src="../shared/performance.js"></script><script src="app.js?v=1"></script></body></html>
