<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Monad Bridge Station 2.0</title>
    <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='6' fill='%23071118'/%3E%3Cpath d='M7 20h18l-5 5h-8zM16 5l6 12H10z' fill='%23e8b95d'/%3E%3C/svg%3E">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
    <link rel="stylesheet" href="style.css">
  </head>
  <body>
    <main class="shell">
      <header class="topbar">
        <div>
          <p class="eyebrow">Monad / Unified View</p>
          <h1>Bridge Station 2.0</h1>
        </div>
        <div class="link-status">
          <span id="liveDot" class="live-dot" aria-hidden="true"></span>
          <span id="linkStatus">Connecting&hellip;</span>
        </div>
      </header>

      <section class="view-grid" aria-label="Composited fleet view">
        <article class="view-panel" aria-label="Fleet plot">
          <div id="map"></div>
        </article>

        <article class="view-panel" aria-label="Optics">
          <canvas id="opticsCanvas"></canvas>
          <div class="optics-overlay">
            <div class="bearing-readout">
              <span>Bearing</span>
              <strong id="bearingReadout">000&deg;</strong>
            </div>
            <p class="drag-hint">Drag to rotate</p>
          </div>
        </article>
      </section>
    </main>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="../shared/fleet-state.js"></script>
    <script src="app.js"></script>
  </body>
</html>
